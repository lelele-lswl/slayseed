spring.application.name=SlaySeed

# Database Configuration - use environment variables for production
# ? Linux ????????????:
# export SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/slayseed
# export SPRING_DATASOURCE_USERNAME=your_user
# export SPRING_DATASOURCE_PASSWORD=your_password
# export SPRING_DATA_REDIS_HOST=localhost
# export SPRING_DATA_REDIS_PORT=6379
# export SPRING_DATA_REDIS_PASSWORD=
# export JWT_SECRET=your-super-secret-key-at-least-256-bits-long
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/slayseed}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration - ensure LocalDateTime is serialized as ISO format
# Jackson 3.x ???? ISO-8601 ????? Java Time ?????????
spring.jackson.time-zone=Asia/Shanghai

# H2 Console (for development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Redis Configuration - auto-disables if not available
# ?? Redis ????????? Redis ?????? spring.data.redis.enabled ?? true ?????? exclude
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.data.redis.enabled=false
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.connect-timeout=1000

# JWT Configuration
jwt.secret=${JWT_SECRET:slayseed-secret-key-must-be-at-least-256-bits-long-for-production-use}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# CORS
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}