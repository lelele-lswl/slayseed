spring.application.name=SlaySeed

# Jasypt Encryption Configuration (SECURITY: Set JASYPT_ENCRYPTOR_KEY as encryption secret key)
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_KEY:}
jasypt.encryptor.algorithm=PBEWithMD5AndDES
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.NoIvGenerator

# Database Configuration - MySQL (Required: Set environment variables)
# export SPRING_DATASOURCE_URL=jdbc:mysql://YOUR_CLOUD_IP:3306/slayseed
# export SPRING_DATASOURCE_USERNAME=your_user
# export SPRING_DATASOURCE_PASSWORD=your_password
# Use ENC() to encrypt sensitive values:ENC(encrypted_value_here)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/slayseed?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ENC(1dvvU4mZNPin4Med8XaQEafczKysY88q)}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration
spring.jackson.time-zone=Asia/Shanghai

# Redis Configuration (Enabled - Required: Set environment variables)
# export SPRING_DATA_REDIS_HOST=YOUR_CLOUD_IP
# export SPRING_DATA_REDIS_PORT=6379
# export SPRING_DATA_REDIS_PASSWORD=your_redis_password
# Use ENC() to encrypt sensitive values:ENC(encrypted_value_here)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:ENC(1dvvU4mZNPin4Med8XaQEafczKysY88q)}
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.connect-timeout=1000

# JWT Configuration (SECURITY: Must set JWT_SECRET environment variable)
# Use ENC() to encrypt:ENC(encrypted_value_here)
jwt.secret=ENC(lh7rfR3JY2ryc5cOCkFa/R4fUi+7BgqF)
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# CORS (SECURITY: Must set specific domain in production)
# Use ENC() to encrypt:ENC(encrypted_value_here)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}