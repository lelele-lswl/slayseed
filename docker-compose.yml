# ============================================
#  Slay Seed 一键部署 (Docker Compose)
#  包含 4 个服务：
#    1. mysql    - 数据库
#    2. redis    - 缓存
#    3. backend  - Spring Boot 后端
#    4. frontend - Vue3 前端 + Nginx
# ============================================
#
#  使用方法：
#    首次构建并启动：docker compose up -d --build
#    后续启动：       docker compose up -d
#    停止：           docker compose down
#    停止并删除数据： docker compose down -v
#    查看日志：       docker compose logs -f
# ============================================

services:

  # ---------- MySQL 数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: slayseed-mysql
    restart: always
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - slayseed-mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slayseed-net

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: slayseed-redis
    restart: always
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - slayseed-redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slayseed-net

  # ---------- Spring Boot 后端 ----------
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: slayseed-backend
    restart: always
    environment:
      TZ: ${TZ}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - slayseed-logs:/logs
    networks:
      - slayseed-net

  # ---------- Vue3 前端 + Nginx ----------
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: slayseed-frontend
    restart: always
    environment:
      TZ: ${TZ}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - slayseed-net

# ---------- 自定义网络 ----------
# 所有服务在同一网络中，通过服务名互相访问
networks:
  slayseed-net:
    driver: bridge

# ---------- 数据卷（持久化）----------
# 即使容器删除，数据也不会丢失
volumes:
  slayseed-mysql:
  slayseed-redis:
  slayseed-logs: